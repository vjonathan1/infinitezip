<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Zip</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #22d3ee;
            --wall: #f43f5e;
            --tile: #334155;
            --tile-active: #0891b2;
            --num: #a7f3d0;
            --cell-size: 60px;
            --gap: 6px;
            --wall-thickness: 6px;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; touch-action: none; align-items: center;
        }

        header {
            width: 100%; padding: 1rem; text-align: center;
            background: var(--panel); box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 50;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--accent); letter-spacing: 2px; font-weight: 900; }
        
        .stats { display: flex; justify-content: center; gap: 2rem; margin-top: 0.5rem; font-family: 'JetBrains Mono', monospace; color: var(--num); }

        #game-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; position: relative;
        }

        /* The Board */
        #grid-container {
            position: relative; 
            background: #00000033;
            padding: var(--gap); 
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            user-select: none;
        }

        #grid { 
            display: grid; 
            gap: var(--gap); 
            position: relative; 
            z-index: 10; 
        }

        .cell {
            width: var(--cell-size); height: var(--cell-size); 
            background: var(--tile);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 1.4rem;
            color: var(--num); transition: background 0.2s, transform 0.1s;
        }

        .cell.filled { background: var(--tile-active); }
        .cell.target { border: 2px solid var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Path Line */
        #svg-canvas {
            position: absolute; 
            top: var(--gap); left: var(--gap);
            width: calc(100% - (var(--gap) * 2)); 
            height: calc(100% - (var(--gap) * 2));
            pointer-events: none; z-index: 20;
            overflow: visible;
        }

        #stroke-path {
            fill: none; stroke: var(--accent); stroke-width: 14;
            stroke-linecap: round; stroke-linejoin: round;
            filter: drop-shadow(0 0 5px var(--accent));
        }

        /* Walls */
        #walls-layer {
            position: absolute;
            top: var(--gap); left: var(--gap);
            width: calc(100% - (var(--gap) * 2));
            height: calc(100% - (var(--gap) * 2));
            pointer-events: none;
            z-index: 30;
        }

        .wall {
            position: absolute; background: var(--wall);
            border-radius: 10px;
            box-shadow: 0 0 8px var(--wall);
            transform: translate(-50%, -50%); /* Crucial for centering on gaps */
        }

        footer {
            width: 100%; padding: 1.5rem; background: var(--panel);
            display: flex; justify-content: center; gap: 1rem;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        button {
            background: var(--accent); border: none; padding: 0.8rem 1.8rem;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            color: var(--bg); text-transform: uppercase; transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        #win-screen {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>INFINITE ZIP</h1>
    <div class="stats">
        <div id="timer">00:00</div>
        <div id="target">Next: 1</div>
    </div>
</header>

<div id="game-area">
    <div id="grid-container">
        <svg id="svg-canvas"><polyline id="stroke-path" points=""></polyline></svg>
        <div id="grid"></div>
        <div id="walls-layer"></div>
    </div>

    <div id="win-screen">
        <h2 style="font-size: 3.5rem; color: var(--accent); margin-bottom: 0;">ZIP!</h2>
        <p style="font-size: 1.2rem; color: var(--num);">Puzzle Mastered</p>
        <p id="final-time" style="margin-bottom: 2rem;"></p>
        <button onclick="nextLevel()">Next Puzzle</button>
    </div>
</div>

<footer>
    <button onclick="resetPath()">Reset Path</button>
    <button style="background: #475569; color: white;" onclick="nextLevel()">Skip</button>
</footer>

<script>
    // --- PUZZLE DATA ---
    const puzzles = [
        {
            size: 4,
            nums: { "0,0": 1, "0,3": 2, "3,0": 3 },
            // walls: [row, col, type] type 0 = bottom wall, 1 = right wall
            walls: [[0, 0, 1], [0, 1, 1], [1, 2, 0], [2, 1, 1], [2, 0, 0]] 
        },
        {
            size: 5,
            nums: { "0,0": 1, "2,2": 2, "4,4": 3 },
            walls: [[0,1,1], [1,1,0], [3,3,0], [3,4,1], [4,1,1]]
        },
        {
            size: 6,
            nums: { "0,0": 1, "5,5": 2 },
            walls: [[0,0,0], [1,1,0], [2,2,0], [3,3,0], [4,4,0]]
        }
    ];

    let currentLvl = 0;
    let path = [];
    let isDragging = false;
    let startTime = null;
    let timerInterval = null;

    const grid = document.getElementById('grid');
    const stroke = document.getElementById('stroke-path');
    const wallLayer = document.getElementById('walls-layer');
    const root = document.querySelector(':root');

    function initGame() {
        const p = puzzles[currentLvl];
        
        // Dynamic Mobile Sizing
        const availableWidth = Math.min(window.innerWidth - 40, 500);
        const calcCellSize = Math.floor((availableWidth - (p.size * 6)) / p.size);
        root.style.setProperty('--cell-size', `${calcCellSize}px`);
        root.style.setProperty('--gap', `6px`);

        grid.style.gridTemplateColumns = `repeat(${p.size}, var(--cell-size))`;
        grid.innerHTML = '';
        wallLayer.innerHTML = '';
        path = [];
        stroke.setAttribute('points', '');
        document.getElementById('win-screen').style.display = 'none';
        
        for(let r=0; r<p.size; r++) {
            for(let c=0; c<p.size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${r}-${c}`;
                cell.dataset.r = r;
                cell.dataset.c = c;
                if(p.nums[`${r},${c}`]) cell.textContent = p.nums[`${r},${c}`];
                grid.appendChild(cell);
            }
        }

        renderWalls(p);
        resetTimer();
        updateTarget();
    }

    function renderWalls(p) {
        const cellSize = parseInt(getComputedStyle(root).getPropertyValue('--cell-size'));
        const gap = parseInt(getComputedStyle(root).getPropertyValue('--gap'));
        const step = cellSize + gap;

        p.walls.forEach(w => {
            const [r, c, type] = w;
            const wall = document.createElement('div');
            wall.className = 'wall';
            
            if(type === 0) { // Horizontal Wall (Bottom of cell)
                wall.style.width = `${cellSize + gap}px`;
                wall.style.height = `var(--wall-thickness)`;
                wall.style.left = `${c * step + cellSize/2}px`;
                wall.style.top = `${(r + 1) * step - gap/2}px`;
            } else { // Vertical Wall (Right of cell)
                wall.style.height = `${cellSize + gap}px`;
                wall.style.width = `var(--wall-thickness)`;
                wall.style.top = `${r * step + cellSize/2}px`;
                wall.style.left = `${(c + 1) * step - gap/2}px`;
            }
            wallLayer.appendChild(wall);
        });
    }

    function handleMove(e) {
        if(!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const el = document.elementFromPoint(clientX, clientY);
        
        if(el && el.classList.contains('cell')) {
            const r = parseInt(el.dataset.r);
            const c = parseInt(el.dataset.c);
            tryMove(r, c);
        }
    }

    function tryMove(r, c) {
        if(path.length === 0) {
            addToPath(r, c);
            startTimer();
            return;
        }

        const last = path[path.length - 1];
        if(last.r === r && last.c === c) return;

        // Fluid Backtracking Logic
        if(path.length > 1) {
            const prev = path[path.length - 2];
            if(prev.r === r && prev.c === c) {
                const removed = path.pop();
                document.getElementById(`c-${removed.r}-${removed.c}`).classList.remove('filled');
                updateTarget();
                renderStroke();
                return;
            }
        }

        // Logic Constraints
        const dr = r - last.r;
        const dc = c - last.c;
        if(Math.abs(dr) + Math.abs(dc) !== 1) return; 
        if(path.find(p => p.r === r && p.c === c)) return; 

        // Wall Collision
        const p = puzzles[currentLvl];
        let blocked = false;
        p.walls.forEach(w => {
            const [wr, wc, type] = w;
            if(type === 0) { // Horizontal Wall
                if(dc === 0 && ((last.r === wr && r === wr + 1) || (last.r === wr + 1 && r === wr)) && c === wc) blocked = true;
            } else { // Vertical Wall
                if(dr === 0 && ((last.c === wc && c === wc + 1) || (last.c === wc + 1 && c === wc)) && r === wr) blocked = true;
            }
        });
        if(blocked) return;

        // Winning Stroke Constraint: Max number MUST be the very last tile.
        const cellVal = p.nums[`${r},${c}`];
        const nextReq = getNextRequiredNum();
        const maxVal = Math.max(...Object.values(p.nums));

        if(cellVal) {
            if(cellVal !== nextReq) return;
            // Check if this is the highest number, if so, are there empty tiles left?
            if(cellVal === maxVal && path.length < (p.size * p.size) - 1) return;
        }

        addToPath(r, c);
        checkWin();
    }

    function addToPath(r, c) {
        path.push({r, c});
        document.getElementById(`c-${r}-${c}`).classList.add('filled');
        updateTarget();
        renderStroke();
    }

    function getNextRequiredNum() {
        const p = puzzles[currentLvl];
        let maxFound = 0;
        path.forEach(pos => {
            const val = p.nums[`${pos.r},${pos.c}`];
            if(val && val > maxFound) maxFound = val;
        });
        return maxFound + 1;
    }

    function renderStroke() {
        const cellSize = parseInt(getComputedStyle(root).getPropertyValue('--cell-size'));
        const gap = parseInt(getComputedStyle(root).getPropertyValue('--gap'));
        const step = cellSize + gap;
        const center = cellSize / 2;

        const points = path.map(p => {
            const x = p.c * step + center;
            const y = p.r * step + center;
            return `${x},${y}`;
        }).join(' ');
        stroke.setAttribute('points', points);
    }

    function checkWin() {
        const p = puzzles[currentLvl];
        const maxVal = Math.max(...Object.values(p.nums));
        const lastCell = path[path.length - 1];
        const lastVal = p.nums[`${lastCell.r},${lastCell.c}`];

        if(path.length === p.size * p.size && lastVal === maxVal) {
            clearInterval(timerInterval);
            document.getElementById('final-time').textContent = `Finished in ${document.getElementById('timer').textContent}`;
            document.getElementById('win-screen').style.display = 'flex';
        }
    }

    function updateTarget() {
        const next = getNextRequiredNum();
        const p = puzzles[currentLvl];
        const max = Math.max(...Object.values(p.nums));
        document.getElementById('target').textContent = next > max ? "Fill All" : `Next: ${next}`;
    }

    function startTimer() {
        if(timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('timer').textContent = "00:00";
    }

    function resetPath() {
        initGame();
    }

    function nextLevel() {
        currentLvl = (currentLvl + 1) % puzzles.length;
        initGame();
    }

    grid.addEventListener('mousedown', (e) => { isDragging = true; handleMove(e); });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('mousemove', handleMove);
    
    grid.addEventListener('touchstart', (e) => { 
        isDragging = true; 
        handleMove(e); 
    }, {passive:false});
    window.addEventListener('touchmove', (e) => {
        if(isDragging) e.preventDefault();
        handleMove(e);
    }, {passive:false});
    window.addEventListener('touchend', () => isDragging = false);

    window.addEventListener('resize', initGame);
    initGame();
</script>
</body>
</html>
