<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Zip</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #22d3ee;
            --wall: #f43f5e;
            --tile: #334155;
            --tile-active: #0891b2;
            --num: #a7f3d0;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden; touch-action: none; align-items: center;
        }

        header {
            width: 100%; padding: 1rem; text-align: center;
            background: var(--panel); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        h1 { margin: 0; font-size: 1.5rem; color: var(--accent); letter-spacing: 1px; }
        
        .stats { display: flex; justify-content: center; gap: 2rem; margin-top: 0.5rem; font-family: monospace; }

        #game-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; position: relative; padding: 10px; box-sizing: border-box;
        }

        #grid-container {
            position: relative; background: var(--panel);
            padding: 8px; border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }

        #grid { display: grid; gap: 4px; position: relative; z-index: 2; }

        .cell {
            width: 50px; height: 50px; background: var(--tile);
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 1.2rem;
            color: var(--num); transition: background 0.15s;
            user-select: none; pointer-events: all;
        }

        .cell.filled { background: var(--tile-active); }

        /* SVG path for the stroke */
        #svg-canvas {
            position: absolute; top: 8px; left: 8px;
            width: calc(100% - 16px); height: calc(100% - 16px);
            pointer-events: none; z-index: 3;
        }

        #stroke-path {
            fill: none; stroke: var(--accent); stroke-width: 12;
            stroke-linecap: round; stroke-linejoin: round;
        }

        /* Wall Rendering */
        .wall {
            position: absolute; background: var(--wall);
            z-index: 4; border-radius: 10px;
            box-shadow: 0 0 10px var(--wall);
        }

        footer {
            width: 100%; padding: 1.5rem; background: var(--panel);
            display: flex; justify-content: center; gap: 1rem;
        }

        button {
            background: var(--accent); border: none; padding: 0.8rem 1.5rem;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            color: var(--bg); text-transform: uppercase;
        }

        #win-screen {
            position: absolute; inset: 0; background: rgba(15, 23, 42, 0.9);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <h1>INFINITE ZIP</h1>
    <div class="stats">
        <div id="timer">00:00</div>
        <div id="target">Target: 1</div>
    </div>
</header>

<div id="game-area">
    <div id="grid-container">
        <svg id="svg-canvas"><polyline id="stroke-path" points=""></polyline></svg>
        <div id="grid"></div>
        <div id="walls-layer"></div>
    </div>

    <div id="win-screen">
        <h2 style="font-size: 3rem; color: var(--accent);">CLEARED!</h2>
        <p id="final-time"></p>
        <button onclick="nextLevel()">Next Puzzle</button>
    </div>
</div>

<footer>
    <button onclick="resetPath()">Reset</button>
    <button style="background: #475569; color: white;" onclick="nextLevel()">Skip</button>
</footer>

<script>
    // --- PUZZLE DATA ---
    const puzzles = [
        {
            size: 4,
            nums: { "0,0": 1, "0,3": 2, "3,0": 3 },
            // Walls defined as [row, col, direction] 
            // direction 0 = horizontal (bottom of cell), 1 = vertical (right of cell)
            walls: [[0, 0, 1], [1, 1, 0], [2, 1, 1], [0, 2, 1]] 
        },
        {
            size: 5,
            nums: { "4,0": 1, "0,0": 2, "0,4": 3, "4,4": 4 },
            walls: [[1,0,0], [3,0,0], [1,2,0], [3,2,0], [1,4,0], [3,4,0]]
        },
        {
            size: 4,
            nums: { "0,0": 1, "1,1": 2, "3,3": 3 },
            walls: [[0,0,0], [1,1,1], [2,2,0]]
        }
    ];

    let currentLvl = 0;
    let path = [];
    let isDragging = false;
    let startTime = null;
    let timerInterval = null;

    const grid = document.getElementById('grid');
    const svg = document.getElementById('svg-canvas');
    const stroke = document.getElementById('stroke-path');
    const wallLayer = document.getElementById('walls-layer');

    function initGame() {
        const p = puzzles[currentLvl];
        grid.style.gridTemplateColumns = `repeat(${p.size}, 50px)`;
        grid.innerHTML = '';
        wallLayer.innerHTML = '';
        path = [];
        stroke.setAttribute('points', '');
        document.getElementById('win-screen').style.display = 'none';
        
        // Create Cells
        for(let r=0; r<p.size; r++) {
            for(let c=0; c<p.size; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `c-${r}-${c}`;
                cell.dataset.r = r;
                cell.dataset.c = c;
                if(p.nums[`${r},${c}`]) cell.textContent = p.nums[`${r},${c}`];
                grid.appendChild(cell);
            }
        }

        // Create Walls
        const cellSize = 50;
        const gap = 4;
        p.walls.forEach(w => {
            const [r, c, type] = w;
            const wall = document.createElement('div');
            wall.className = 'wall';
            if(type === 0) { // Horizontal (below cell)
                wall.style.width = '50px';
                wall.style.height = '6px';
                wall.style.top = `${(r + 1) * (cellSize + gap) - gap/2 - 3}px`;
                wall.style.left = `${c * (cellSize + gap)}px`;
            } else { // Vertical (right of cell)
                wall.style.height = '50px';
                wall.style.width = '6px';
                wall.style.left = `${(c + 1) * (cellSize + gap) - gap/2 - 3}px`;
                wall.style.top = `${r * (cellSize + gap)}px`;
            }
            wallLayer.appendChild(wall);
        });

        resetTimer();
        updateTarget();
    }

    function handleMove(e) {
        if(!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const el = document.elementFromPoint(clientX, clientY);
        
        if(el && el.classList.contains('cell')) {
            const r = parseInt(el.dataset.r);
            const c = parseInt(el.dataset.c);
            tryMove(r, c);
        }
    }

    function tryMove(r, c) {
        if(path.length === 0) {
            addToPath(r, c);
            startTimer();
            return;
        }

        const last = path[path.length - 1];
        if(last.r === r && last.c === c) return;

        // Backtracking
        if(path.length > 1) {
            const prev = path[path.length - 2];
            if(prev.r === r && prev.c === c) {
                const removed = path.pop();
                document.getElementById(`c-${removed.r}-${removed.c}`).classList.remove('filled');
                updateTarget();
                renderStroke();
                return;
            }
        }

        // Adjacency & Wall Check
        const dr = r - last.r;
        const dc = c - last.c;
        if(Math.abs(dr) + Math.abs(dc) !== 1) return; // Must be 1 step
        if(path.find(p => p.r === r && p.c === c)) return; // No repeats

        // Wall Logic Check
        const p = puzzles[currentLvl];
        let blocked = false;
        p.walls.forEach(w => {
            const [wr, wc, type] = w;
            if(type === 0) { // Horizontal Wall
                if(dc === 0 && ((last.r === wr && r === wr + 1) || (last.r === wr + 1 && r === wr)) && c === wc) blocked = true;
            } else { // Vertical Wall
                if(dr === 0 && ((last.c === wc && c === wc + 1) || (last.c === wc + 1 && c === wc)) && r === wr) blocked = true;
            }
        });
        if(blocked) return;

        // Sequence Check
        const cellVal = p.nums[`${r},${c}`];
        const nextReq = getNextRequiredNum();
        const maxVal = Math.max(...Object.values(p.nums));

        if(cellVal) {
            if(cellVal !== nextReq) return;
            // If it's the final number, it MUST be the last empty tile
            if(cellVal === maxVal && path.length < (p.size * p.size) - 1) return;
        }

        addToPath(r, c);
        checkWin();
    }

    function addToPath(r, c) {
        path.push({r, c});
        document.getElementById(`c-${r}-${c}`).classList.add('filled');
        updateTarget();
        renderStroke();
    }

    function getNextRequiredNum() {
        const p = puzzles[currentLvl];
        let maxFound = 0;
        path.forEach(pos => {
            const val = p.nums[`${pos.r},${pos.c}`];
            if(val && val > maxFound) maxFound = val;
        });
        return maxFound + 1;
    }

    function renderStroke() {
        const points = path.map(p => {
            const x = p.c * 54 + 25;
            const y = p.r * 54 + 25;
            return `${x},${y}`;
        }).join(' ');
        stroke.setAttribute('points', points);
    }

    function checkWin() {
        const p = puzzles[currentLvl];
        const maxVal = Math.max(...Object.values(p.nums));
        const lastCell = path[path.length - 1];
        const lastVal = p.nums[`${lastCell.r},${lastCell.c}`];

        if(path.length === p.size * p.size && lastVal === maxVal) {
            clearInterval(timerInterval);
            document.getElementById('final-time').textContent = `Time: ${document.getElementById('timer').textContent}`;
            document.getElementById('win-screen').style.display = 'flex';
        }
    }

    // --- UI HELPERS ---
    function updateTarget() {
        const next = getNextRequiredNum();
        const p = puzzles[currentLvl];
        const max = Math.max(...Object.values(p.nums));
        document.getElementById('target').textContent = next > max ? "Fill Board" : `Next: ${next}`;
    }

    function startTimer() {
        if(timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById('timer').textContent = "00:00";
    }

    function resetPath() {
        const p = puzzles[currentLvl];
        path = [];
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('filled'));
        stroke.setAttribute('points', '');
        resetTimer();
        updateTarget();
    }

    function nextLevel() {
        currentLvl = (currentLvl + 1) % puzzles.length;
        initGame();
    }

    // Listeners
    grid.addEventListener('mousedown', () => isDragging = true);
    window.addEventListener('mouseup', () => isDragging = false);
    grid.addEventListener('mousemove', handleMove);
    grid.addEventListener('touchstart', (e) => { isDragging = true; handleMove(e); }, {passive:false});
    grid.addEventListener('touchmove', handleMove, {passive:false});
    window.addEventListener('touchend', () => isDragging = false);

    initGame();
</script>
</body>
</html>
